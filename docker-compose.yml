services:
  db:
    image: mysql:8.0
    container_name: socialmetrics_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: socialmetrics_db
      MYSQL_USER: user_api
      MYSQL_PASSWORD: api_password
    ports:
      - "3306:3306"
    volumes:
      - ./data/schema.sql:/docker-entrypoint-initdb.d/init.sql
      - db_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: socialmetrics_pma
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "8080:80"
    depends_on:
      - db

  api:
    build: .
    container_name: socialmetrics_api
    ports:
      - "5000:5000"
    volumes:
      - .:/app
    environment:
      - FLASK_ENV=development
    depends_on:
      - db

  cron:
      image: docker:cli
      container_name: socialmetrics_cron
      depends_on:
        - api
      volumes:
        - /var/run/docker.sock:/var/run/docker.sock
        - ./retrain.sh:/retrain.sh
      command: >
        sh -c "
        chmod +x /retrain.sh
        && echo '0 3 * * 0 /retrain.sh >> /var/log/cron.log 2>&1' > /etc/crontabs/root
        && crond -f
        "

volumes:
  db_data: